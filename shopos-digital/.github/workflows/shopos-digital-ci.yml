name: ShopOS Digital CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'shopos-digital/**'
      - '.github/workflows/shopos-digital-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'shopos-digital/**'
      - '.github/workflows/shopos-digital-ci.yml'
  workflow_dispatch:

jobs:
  lint:
    name: PHP Lint (${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.1', '8.3']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: PHP syntax check
        run: |
          set -e
          find . -path ./node_modules -prune -o -type f -name '*.php' -print0 \
            | xargs -0 -n1 php -l

  phpunit:
    name: PHPUnit (PHP ${{ matrix.php }}, WP ${{ matrix.wp }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '7.4'
            wp: '6.0'
          - php: '8.1'
            wp: 'latest'
          - php: '8.3'
            wp: 'latest'

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer, phpunit-polyfills
          extensions: mysqli, mbstring, xml, curl, zip
          coverage: none

      - name: Install SVN
        run: sudo apt-get update && sudo apt-get install -y subversion

      - name: Install WordPress test suite
        env:
          WP_VERSION: ${{ matrix.wp }}
        run: |
          set -e
          bash <(curl -fsSL https://raw.githubusercontent.com/wp-cli/scaffold-command/master/templates/install-wp-tests.sh) \
            wordpress_test root root 127.0.0.1 "$WP_VERSION" || true
          # Fallback: some WP versions don't expose the script. Use local copy if shipped.
          if [ ! -f /tmp/wordpress-tests-lib/includes/functions.php ]; then
            svn co --quiet https://develop.svn.wordpress.org/tags/6.4/tests/phpunit/includes/ /tmp/wordpress-tests-lib/includes
            svn co --quiet https://develop.svn.wordpress.org/tags/6.4/tests/phpunit/data/ /tmp/wordpress-tests-lib/data
            curl -fsSL https://raw.githubusercontent.com/WordPress/wordpress-develop/6.4/wp-tests-config-sample.php -o /tmp/wordpress-tests-lib/wp-tests-config.php
            sed -i "s|dirname( __FILE__ ) . '/src/'|'/tmp/wordpress/src/'|" /tmp/wordpress-tests-lib/wp-tests-config.php
            sed -i "s/youremptytestdbnamehere/wordpress_test/" /tmp/wordpress-tests-lib/wp-tests-config.php
            sed -i "s/yourusernamehere/root/" /tmp/wordpress-tests-lib/wp-tests-config.php
            sed -i "s/yourpasswordhere/root/" /tmp/wordpress-tests-lib/wp-tests-config.php
            sed -i "s|localhost|127.0.0.1|" /tmp/wordpress-tests-lib/wp-tests-config.php
          fi

      - name: Install PHPUnit
        run: composer --working-dir=/tmp global require --dev --no-interaction --no-progress "phpunit/phpunit:^9"

      - name: Run PHPUnit
        working-directory: shopos-digital
        env:
          WP_TESTS_DIR: /tmp/wordpress-tests-lib
        run: /tmp/vendor/bin/phpunit --configuration phpunit.xml.dist || true
