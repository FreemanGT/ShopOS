# ShopOS Digital CI — the UNMASKED successor to the dead nested workflow that
# lived at shopos-digital/.github/workflows/ (GitHub only registers workflows
# from the repo root, so that file never ran; and even its phpunit step ended
# in `|| true`). This one actually gates: the PHPUnit step has no mask.
#
# Path-filtered — runs only when shopos-digital/** (or this file) changes.
# PHP 7.4 lane dropped along with the rest of the repo (2026-05-03 / 1.11.22).
name: ShopOS Digital CI

on:
  push:
    paths:
      - 'shopos-digital/**'
      - '.github/workflows/shopos-digital-ci.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'shopos-digital/**'
      - '.github/workflows/shopos-digital-ci.yml'
  workflow_dispatch:

jobs:
  phpunit:
    name: PHPUnit (PHP ${{ matrix.php }}, WP ${{ matrix.wp }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.1'
            wp: 'latest'
          - php: '8.3'
            wp: 'latest'

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer
          extensions: mysqli, mbstring, xml, curl, zip
          coverage: none

      - name: php -l on every shopos-digital source file
        run: |
          find shopos-digital -type f -name '*.php' \
            -not -path '*/node_modules/*' -not -path '*/vendor/*' \
            -print0 | xargs -0 -n1 php -l >/dev/null

      - name: Install SVN
        run: sudo apt-get update && sudo apt-get install -y subversion

      - name: Install WordPress test suite
        env:
          WP_VERSION: ${{ matrix.wp }}
        run: |
          set -e
          # NOTE: the old `master` URL is a deprecated stub that warns and does
          # nothing — the dead workflow's `|| true` + svn fallback was papering
          # over exactly that. Use `main`, then hard-verify the lib landed so a
          # silent no-op fails HERE, not at phpunit time.
          bash <(curl -fsSL https://raw.githubusercontent.com/wp-cli/scaffold-command/main/templates/install-wp-tests.sh) \
            wordpress_test root root 127.0.0.1 "$WP_VERSION"
          test -f /tmp/wordpress-tests-lib/includes/functions.php

      - name: Install PHPUnit + polyfills
        run: composer require --dev --working-dir=/tmp --no-interaction --no-progress "phpunit/phpunit:^9" "yoast/phpunit-polyfills:^2"

      - name: Run PHPUnit (unmasked)
        working-directory: shopos-digital
        env:
          WP_TESTS_DIR: /tmp/wordpress-tests-lib
          WP_TESTS_PHPUNIT_POLYFILLS_PATH: /tmp/vendor/yoast/phpunit-polyfills
        run: /tmp/vendor/bin/phpunit --configuration phpunit.xml.dist
