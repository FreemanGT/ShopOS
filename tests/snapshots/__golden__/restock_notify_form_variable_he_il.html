<style>
				.shopos-restock-form-wrap{margin:24px 0;text-align:start}
				.shopos-restock-form-card{background:var(--shopos-ui-color-paper,#fff);border:1px solid var(--shopos-ui-color-hairline,#e5e5e5);border-radius:var(--shopos-ui-radius-lg,12px);padding:32px 28px;max-width:480px;text-align:start;font-family:var(--shopos-ui-font-body,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif)}
				.shopos-restock-form-heading{margin:0 0 6px;font-size:18px;font-weight:600;color:var(--shopos-ui-color-ink,#111)}
				.shopos-restock-form-desc{margin:0 0 20px;font-size:14px;color:var(--shopos-ui-color-ink-muted,#666);line-height:1.6}
				.shopos-restock-form-fields{display:flex;flex-direction:column;gap:12px}
				.shopos-restock-field-row{display:flex;gap:10px}
				.shopos-restock-field{flex:1}
				.shopos-restock-input{display:block;width:100%;padding:11px 14px;font-size:14px;color:var(--shopos-ui-color-ink,#111);background:var(--shopos-ui-color-paper-soft,#fafafa);border:1px solid var(--shopos-ui-color-hairline,#e0e0e0);border-radius:var(--shopos-ui-radius-xs,2px);outline:none;box-sizing:border-box;text-align:start;font-family:inherit}
				.shopos-restock-input:focus-visible{outline:var(--shopos-ui-focus-outline,2px solid #1b1b1b);outline-offset:2px}
				.shopos-restock-submit-btn{display:flex;align-items:center;justify-content:center;width:100%;padding:12px 20px;font-size:14px;font-weight:600;color:var(--shopos-ui-color-accent-text,#fff);background:var(--shopos-ui-color-accent,#111);border:none;border-radius:var(--shopos-ui-radius-xs,2px);cursor:pointer;font-family:inherit}
				.shopos-restock-submit-btn:hover{background:var(--shopos-ui-color-accent-hover,#333)}
				.shopos-restock-hidden{display:none!important}
				.shopos-restock-form-icon{display:flex;align-items:center;justify-content:center;width:44px;height:44px;background:var(--shopos-ui-color-accent,#000);border-radius:var(--shopos-ui-radius-round,50%);margin-bottom:16px;color:var(--shopos-ui-color-accent-text,#fff)}
				.shopos-restock-form-success{text-align:center;padding:8px 0}
				.shopos-restock-success-icon{display:inline-flex;align-items:center;justify-content:center;width:52px;height:52px;background:var(--shopos-ui-color-paper-dim,#f0f0f0);border-radius:var(--shopos-ui-radius-round,50%);margin-bottom:12px;color:var(--shopos-ui-color-ink,#111)}
				.shopos-restock-error-text{margin:0;padding:10px 14px;font-size:13px;color:var(--shopos-ui-color-danger,#c00);background:var(--shopos-ui-color-danger-soft,#fff5f5);border:1px solid var(--shopos-ui-color-danger-soft,#fdd);border-radius:var(--shopos-ui-radius-md,6px)}
				.shopos-restock-gdpr-label{display:flex;align-items:flex-start;gap:8px;font-size:12.5px;color:var(--shopos-ui-color-ink-muted,#666);cursor:pointer}
				.shopos-restock-btn-spinner{display:none}
				.shopos-restock-loading .shopos-restock-btn-text{display:none}
				.shopos-restock-loading .shopos-restock-btn-spinner{display:inline-flex;animation:rsnSpin var(--shopos-ui-motion-spin,.8s) linear infinite}
				.shopos-restock-loading{pointer-events:none;opacity:.7}
				@keyframes rsnSpin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
				@keyframes rsnFadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
				.shopos-restock-form-wrap{animation:rsnFadeIn var(--shopos-ui-motion-base,.4s) var(--shopos-ui-ease-out,ease-out)}
				@media(max-width:480px){.shopos-restock-field-row{flex-direction:column}.shopos-restock-form-card{padding:24px 20px}}
			</style>		<div class="shopos-restock-form-wrap shopos-restock-variable-product shopos-restock-hidden" dir="rtl" data-product-id="42" data-variation-id="0">
			<div class="shopos-restock-form-card">
				<div class="shopos-restock-form-icon">
					<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
						<path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
						<path d="M13.73 21a2 2 0 0 1-3.46 0"/>
					</svg>
				</div>
				<h4 class="shopos-restock-form-heading">HEADING</h4>
				<p class="shopos-restock-form-desc">DESCRIPTION.</p>

							<input type="text" class="shopos-restock-input shopos-restock-name" placeholder="שם מלא" autocomplete="name" />
						</div>
						<div class="shopos-restock-field">
							<input type="email" class="shopos-restock-input shopos-restock-email" placeholder="כתובת אימייל" autocomplete="email" required />
						</div>
					</div>

					<!-- honeypot: real users can't see this; bots fill it. -->
					<input type="text" name="_hp" class="shopos-restock-hp" tabindex="-1" autocomplete="off" aria-hidden="true" style="position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden;" />

					
					<button type="button" class="shopos-restock-submit-btn">
						<span class="shopos-restock-btn-text">BUTTON</span>
						<span class="shopos-restock-btn-spinner">
							<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
								<path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
							</svg>
						</span>
					</button>
				</div>

				<div class="shopos-restock-form-success shopos-restock-hidden">
					<div class="shopos-restock-success-icon">
						<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
							<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
							<polyline points="22 4 12 14.01 9 11.01"/>
						</svg>
					</div>
					<p class="shopos-restock-success-text">SUCCESS</p>
				</div>

				<div class="shopos-restock-form-error shopos-restock-hidden">
					<p class="shopos-restock-error-text"></p>
				</div>
			</div>
		</div>
